<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Pong — 像素球拍對決</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050d1a;
      --bg2: #0a1628;
      --p1: #00d4ff;
      --p2: #ff4466;
      --ball: #ffffff;
      --text: #e0f7ff;
      --text-dim: #4a7a9a;
      --glow-p1: 0 0 12px #00d4ff66;
      --glow-p2: 0 0 12px #ff446666;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    #app { width: 100%; max-width: 760px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .scoreboard {
      display: flex;
      align-items: center;
      gap: 40px;
      font-family: 'Orbitron', monospace;
    }
    .score-box { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 80px; }
    .score-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }
    .score-value { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .score-box.p1 .score-value { color: var(--p1); text-shadow: 0 0 20px var(--p1); }
    .score-box.p2 .score-value { color: var(--p2); text-shadow: 0 0 20px var(--p2); }

    .vs { font-size: 1.2rem; color: var(--text-dim); font-weight: 700; }

    .canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,212,255,0.05);
    }

    canvas { display: block; background: #020c1a; }

    .hud-row { display: flex; justify-content: space-between; width: 100%; max-width: 700px; align-items: center; }
    .hud-info { font-size: 0.75rem; color: var(--text-dim); }
    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 30px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-primary { background: var(--p1); color: var(--bg); font-weight: 700; box-shadow: var(--glow-p1); }
    .btn-primary:hover { background: #33ddff; }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid rgba(0,212,255,0.15); }
    .btn-secondary:hover { color: var(--text); border-color: var(--p1); }

    /* ── START SCREEN ── */
    #start-screen { display: flex; flex-direction: column; align-items: center; gap: 28px; text-align: center; }
    .title-big { font-family: 'Orbitron', monospace; font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 900; letter-spacing: 0.05em; line-height: 1.1; }
    .title-big span.p1-text { color: var(--p1); text-shadow: 0 0 30px var(--p1); }
    .title-big span.p2-text { color: var(--p2); text-shadow: 0 0 30px var(--p2); }

    .rules-list { list-style: none; display: flex; flex-direction: column; gap: 8px; text-align: left; min-width: 300px; }
    .rules-list li { font-size: 0.85rem; color: var(--text-dim); padding-left: 16px; position: relative; }
    .rules-list li::before { content: '▸'; position: absolute; left: 0; color: var(--p1); }

    .desc-row { display: flex; gap: 24px; justify-content: center; font-size: 0.8rem; color: var(--text-dim); }
    .desc-row span { display: flex; align-items: center; gap: 6px; }

    #start-screen.hidden, #game-screen.hidden, #win-screen.hidden { display: none; }

    /* ── WIN SCREEN ── */
    #win-screen { display: none; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
    .win-emoji { font-size: 72px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .win-title { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 900; }
    .win-title.p1-win { color: var(--p1); text-shadow: 0 0 30px var(--p1); }
    .win-title.p2-win { color: var(--p2); text-shadow: 0 0 30px var(--p2); }
    .win-sub { font-size: 0.9rem; color: var(--text-dim); }
    .win-score { font-family: 'Orbitron', monospace; font-size: 2.5rem; font-weight: 900; color: var(--text); }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    @media (max-width: 500px) {
      .score-value { font-size: 2.5rem; }
      .scoreboard { gap: 20px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div id="start-screen">
    <div class="title-big">
      <span class="p1-text">PING</span><br>
      <span class="p2-text">PONG</span>
    </div>
    <ul class="rules-list">
      <li>滑鼠控制左邊藍色球拍（上下移動）</li>
      <li>電腦控制右邊紅色球拍</li>
      <li>11 分制，先拿 11 分者勝</li>
      <li>每得一分球速加快一點點</li>
    </ul>
    <div class="desc-row">
      <span>🎮 玩家 <strong style="color:var(--p1)">VS</strong> 電腦</span>
      <span>📱 支援觸控</span>
    </div>
    <button class="btn btn-primary" onclick="startGame()">開始發球</button>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="hidden">
    <div class="hud-row">
      <div class="hud-info" id="hud-level">球速: 6.0</div>
      <button class="btn btn-secondary" onclick="pauseGame()">暫停</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="pong"></canvas>
    </div>
  </div>

  <!-- WIN -->
  <div id="win-screen">
    <div class="win-emoji" id="win-emoji">🏆</div>
    <div class="win-title" id="win-title">玩家獲勝！</div>
    <div class="win-sub">最終比數</div>
    <div class="win-score" id="win-score">11 - 9</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startGame()">再來一局</button>
      <button class="btn btn-secondary" onclick="showStart()">回主選單</button>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById('pong');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 32, 700);
  const ratio = 0.5;
  canvas.width = maxW;
  canvas.height = Math.round(maxW * ratio);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); if (gameState === 'playing') draw(); });

// Game constants
const PADDLE_H_RATIO = 0.18;  // relative to canvas height
const BALL_R = 8;
const WIN_SCORE = 11;

let gameState = 'start'; // start | playing | paused | win
let animationId = null;

// Scores
let p1Score = 0, p2Score = 0;

// Ball
let bx, by, bvx, bvy, ballSpeed;

// Paddles
let paddleW, paddleH;
let p1y, p2y; // center y
let p1vy = 0;  // player velocity
let aiVY = 0;  // AI velocity
const AI_SPEED = 3.8;
const PADDLE_SPEED = 5.5;
const FRICTION = 0.88;

// Trail
const trail = [];
const TRAIL_LEN = 6;

// Score flash
let flashTimer = 0;

// Level
let level = 0;

// Input
let mouseY = null;
let touchY = null;

function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return { y: (e.touches[0].clientY - rect.top) * scaleY };
  }
  return { y: (e.clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousemove', (e) => {
  const { y } = getCanvasCoords(e);
  mouseY = y;
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const { y } = getCanvasCoords(e);
  touchY = y;
}, { passive: false });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const { y } = getCanvasCoords(e);
  touchY = y;
}, { passive: false });

function resetBall(dir = 1) {
  bx = canvas.width / 2;
  by = canvas.height / 2;
  const angle = (Math.random() * 0.8 - 0.4); // random angle
  ballSpeed = 5.5 + level * 0.4;
  if (ballSpeed > 11) ballSpeed = 11;
  bvx = dir * ballSpeed * Math.cos(angle);
  bvy = ballSpeed * Math.sin(angle);
  trail.length = 0;
}

function initGame() {
  paddleW = 10;
  paddleH = canvas.height * PADDLE_H_RATIO;
  p1y = canvas.height / 2;
  p2y = canvas.height / 2;
  p1Score = 0;
  p2Score = 0;
  level = 0;
  resetBall(Math.random() < 0.5 ? 1 : -1);
}

function startGame() {
  initGame();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('win-screen').style.display = 'none';
  document.getElementById('game-screen').classList.remove('hidden');
  gameState = 'playing';
  document.getElementById('hud-level').textContent = `球速: ${ballSpeed.toFixed(1)}`;
  if (animationId) cancelAnimationFrame(animationId);
  loop();
}

function pauseGame() {
  if (gameState === 'playing') {
    gameState = 'paused';
    cancelAnimationFrame(animationId);
  } else if (gameState === 'paused') {
    gameState = 'playing';
    loop();
  }
}

function showStart() {
  gameState = 'start';
  if (animationId) cancelAnimationFrame(animationId);
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('win-screen').style.display = 'none';
  document.getElementById('start-screen').classList.remove('hidden');
}

function showWin(winner) {
  gameState = 'win';
  cancelAnimationFrame(animationId);
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('win-screen').style.display = 'flex';

  const emoji = winner === 1 ? '🏆' : '🤖';
  const title = winner === 1 ? '玩家獲勝！' : '電腦獲勝！';
  const cls = winner === 1 ? 'p1-win' : 'p2-win';

  document.getElementById('win-emoji').textContent = emoji;
  const t = document.getElementById('win-title');
  t.textContent = title;
  t.className = `win-title ${cls}`;
  document.getElementById('win-score').textContent = `${p1Score} - ${p2Score}`;
}

function scorePoint(scorer) {
  if (scorer === 1) p1Score++;
  else p2Score++;
  level++;
  document.getElementById('hud-level').textContent = `球速: ${ballSpeed.toFixed(1)}`;
  flashTimer = 20;
  if (p1Score >= WIN_SCORE || p2Score >= WIN_SCORE) {
    setTimeout(() => showWin(p1Score >= WIN_SCORE ? 1 : 2), 800);
  } else {
    setTimeout(() => resetBall(scorer === 1 ? 1 : -1), 600);
  }
}

// AI
let aiTargetY = null;
let aiThinkTimer = 0;

function updateAI() {
  aiThinkTimer--;
  if (aiThinkTimer <= 0) {
    // Predict where ball will be
    if (bvx > 0) {
      let predY = by;
      let predX = canvas.width;
      let simVx = bvx, simVy = bvy;
      while (predX < canvas.width - paddleW - 20) {
        predX += simVx;
        predY += simVy;
        if (predY <= 0 || predY >= canvas.height) simVy *= -1;
      }
      // Add some imperfection
      aiTargetY = predY + (Math.random() - 0.5) * paddleH * 0.8;
    } else {
      aiTargetY = canvas.height / 2 + (Math.random() - 0.5) * canvas.height * 0.3;
    }
    aiThinkTimer = 6 + Math.floor(Math.random() * 8);
  }

  if (aiTargetY !== null) {
    const diff = aiTargetY - p2y;
    if (Math.abs(diff) > AI_SPEED) {
      aiVY = diff > 0 ? AI_SPEED : -AI_SPEED;
    } else {
      aiVY = diff * 0.3;
    }
  }
}

// Draw
function draw() {
  const W = canvas.width, H = canvas.height;

  // BG
  ctx.fillStyle = '#020c1a';
  ctx.fillRect(0, 0, W, H);

  // Center line
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Trail
  trail.forEach((t, i) => {
    const alpha = (i / trail.length) * 0.3;
    const r = BALL_R * (i / trail.length) * 0.8;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Ball
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.shadowBlur = 0;

  // Paddles
  const p1x = 16;
  const p2x = W - 16 - paddleW;

  // P1 paddle (player - blue)
  const grad1 = ctx.createLinearGradient(p1x, p1y - paddleH/2, p1x + paddleW, p1y + paddleH/2);
  grad1.addColorStop(0, '#00d4ff');
  grad1.addColorStop(1, '#005577');
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 15;
  ctx.fillStyle = grad1;
  ctx.beginPath();
  ctx.roundRect(p1x, p1y - paddleH/2, paddleW, paddleH, 4);
  ctx.fill();
  ctx.shadowBlur = 0;

  // P2 paddle (AI - red)
  const grad2 = ctx.createLinearGradient(p2x, p2y - paddleH/2, p2x + paddleW, p2y + paddleH/2);
  grad2.addColorStop(0, '#ff4466');
  grad2.addColorStop(1, '#880022');
  ctx.shadowColor = '#ff4466';
  ctx.shadowBlur = 15;
  ctx.fillStyle = grad2;
  ctx.beginPath();
  ctx.roundRect(p2x, p2y - paddleH/2, paddleW, paddleH, 4);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Scores (real-time, drawn as large background text)
  ctx.font = `900 ${H * 0.28}px 'Orbitron', monospace`;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,212,255,0.10)';
  ctx.fillText(p1Score, W * 0.28, H * 0.08);
  ctx.fillStyle = 'rgba(255,68,102,0.10)';
  ctx.fillText(p2Score, W * 0.72, H * 0.08);
}

function update() {
  const W = canvas.width, H = canvas.height;

  // Player control
  const targetY = touchY !== null ? touchY : (mouseY !== null ? mouseY : p1y);
  const diff = targetY - p1y;
  if (Math.abs(diff) > 2) {
    p1vy = diff > 0 ? PADDLE_SPEED : -PADDLE_SPEED;
    p1vy *= 0.85;
  } else {
    p1vy *= 0.6;
  }
  p1y += p1vy;
  p1y = Math.max(paddleH / 2, Math.min(H - paddleH / 2, p1y));

  // AI
  updateAI();
  p2y += aiVY;
  p2y = Math.max(paddleH / 2, Math.min(H - paddleH / 2, p2y));

  // Ball trail
  trail.push({ x: bx, y: by });
  if (trail.length > TRAIL_LEN) trail.shift();

  // Ball movement
  bx += bvx;
  by += bvy;

  // Top/bottom bounce
  if (by - BALL_R <= 0) { by = BALL_R; bvy = Math.abs(bvy); }
  if (by + BALL_R >= H) { by = H - BALL_R; bvy = -Math.abs(bvy); }

  const p1x = 16;
  const p2x = W - 16 - paddleW;

  // P1 collision
  if (bx - BALL_R <= p1x + paddleW && bx >= p1x) {
    if (by >= p1y - paddleH/2 - BALL_R && by <= p1y + paddleH/2 + BALL_R) {
      bx = p1x + paddleW + BALL_R;
      const hitRatio = (by - p1y) / (paddleH / 2);
      const angle = hitRatio * (Math.PI / 3.5);
      bvx = ballSpeed * Math.cos(angle);
      bvy = ballSpeed * Math.sin(angle);
      if (bvx < 2) bvx = 2;
    }
  }

  // P2 collision
  if (bx + BALL_R >= p2x && bx <= p2x + paddleW) {
    if (by >= p2y - paddleH/2 - BALL_R && by <= p2y + paddleH/2 + BALL_R) {
      bx = p2x - BALL_R;
      const hitRatio = (by - p2y) / (paddleH / 2);
      const angle = Math.PI - hitRatio * (Math.PI / 3.5);
      bvx = ballSpeed * Math.cos(angle);
      bvy = ballSpeed * Math.sin(angle);
      if (bvx > -2) bvx = -2;
    }
  }

  // Scoring
  if (bx + BALL_R < 0) {
    // Reset ball position immediately to prevent double-scoring
    bx = canvas.width / 2;
    by = canvas.height / 2;
    bvx = 0; bvy = 0;
    scorePoint(2); // AI scores
    return;
  }
  if (bx - BALL_R > canvas.width) {
    bx = canvas.width / 2;
    by = canvas.height / 2;
    bvx = 0; bvy = 0;
    scorePoint(1); // Player scores
    return;
  }
}

function loop() {
  if (gameState !== 'playing') return;
  update();
  draw();
  animationId = requestAnimationFrame(loop);
}

// Expose
window.startGame = startGame;
window.pauseGame = pauseGame;
window.showStart = showStart;
</script>
</body>
</html>
